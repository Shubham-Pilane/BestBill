server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Optimizations for serving large files (like your 87MB .exe)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Specific rule for downloads
    location /downloads/ {
        try_files $uri =404;
        add_header Content-Disposition "attachment";
    }

    # Handle React routing and prevent caching of index.html
    location / {
        try_files $uri $uri/ /index.html;
        
        # Don't cache the index.html so users always get the newest version
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Expires "0";
    }
}
